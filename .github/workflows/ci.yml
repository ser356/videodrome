name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all --check

  check:
    # Matrix con macos-latest para que el código gateado a
    # `target_os = "macos"` (Keychain) se compile y se lintee de verdad,
    # no solo en Linux.
    #
    # NOTA: no usamos `--all-features` porque `--features gui` arrastra
    # Tauri, que a su vez exige `ui/dist` (build de Vite/React) y libs
    # de sistema (webkit2gtk en Linux). El build de la GUI se valida en
    # el workflow `release.yml`, no en cada PR. Aquí solo probamos el
    # CLI/TUI puros — que son el 90% del código.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cachear dependencias de cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release
