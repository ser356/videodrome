name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all --check

  check:
    # Matrix con las tres plataformas soportadas — el código gateado a
    # `target_os = "macos"` (Keychain), `target_os = "windows"` (winreg,
    # ffmpeg fallback dirs, VLC discovery, cmd/taskkill) y linux/BSD
    # se compila y se lintea de verdad en su SO nativo, no solo en Linux.
    #
    # NOTA: no usamos `--all-features` porque `--features gui` arrastra
    # Tauri, que a su vez exige `ui/dist` (build de Vite/React) y libs
    # de sistema (webkit2gtk en Linux). El build de la GUI se valida en
    # el workflow `release.yml`, no en cada PR. Aquí solo probamos el
    # CLI/TUI puros — que son el 90% del código.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cachear dependencias de cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release

  gui-check:
    # Build + lint del código gateado por `--features gui` (Tauri +
    # HLS + player HTML). Matriz macOS + Windows: macOS valida la
    # rama WKWebView + Keychain, Windows valida winreg + WebView2
    # + ffmpeg fallback dirs. Linux queda fuera porque exigiría
    # webkit2gtk4 + libsoup3 (deps pesadas y frágiles en CI); su
    # cobertura llega vía `release.yml` cuando se hace release real.
    # La lógica de Rust bajo `#[cfg(feature = "gui")]` es 95 %
    # portable, así que con dos SO ya cazamos regresiones (typechecks,
    # clippy, firmas de comandos Tauri).
    #
    # Antes de `cargo clippy --features gui` hay que generar `ui/dist`
    # con Vite — Tauri lo referencia como `frontendDist` en
    # `tauri.conf.json` y sin él el build falla al empaquetar assets.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cachear dependencias de cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ matrix.os }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci (ui)
        working-directory: ui
        run: npm ci

      - name: typecheck + build (ui)
        working-directory: ui
        run: |
          npx tsc --noEmit
          npm run build

      - name: cargo clippy --features gui
        run: cargo clippy --features gui --all-targets -- -D warnings

      - name: cargo test --features gui
        run: cargo test --features gui

      # Fixture E-AC-3 5.1 → verificar que la argv de spawn_hls
      # produce un segmento AAC 2ch en Windows. Chromium/WebView2
      # rechaza AAC >2ch con `kUnsupportedConfig`, y el test unitario
      # sólo verifica argv — este ejercita ffmpeg de verdad y valida
      # el output con ffprobe. Ignored por defecto (`-- --ignored`)
      # porque necesita el binario, que sólo instalamos en Windows.
      # Si un día se activa el player embebido en Linux hay que
      # replicar este step en un job Linux con `apt install ffmpeg`.
      - name: Instalar ffmpeg (Windows, para test de fixture AAC 2.0)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress
        shell: pwsh

      - name: cargo test (fixture AAC 2.0 downmix)
        if: runner.os == 'Windows'
        run: cargo test --features gui windows_aac_downmix_produces_stereo -- --ignored --nocapture
