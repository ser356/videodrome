name: Smoke test package managers

# Smoke tests que verifican que los manifests publicados en los buckets
# externos (ser356/scoop-bucket, ser356/homebrew-cask) instalan y
# ejecutan el binario correctamente. Prueba tanto la GUI (arranque del
# .app / .exe) como el CLI (subcomandos por terminal desde el mismo
# binario).
#
# Solo se lanza a mano — el CI normal no lo dispara para no gastar
# minutos de runner en cada push.
on:
  workflow_dispatch:

jobs:
  scoop:
    runs-on: windows-latest
    steps:
      - name: Instalar Scoop
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-Expression (New-Object System.Net.WebClient).DownloadString('https://get.scoop.sh')
          "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" --version

      - name: Añadir bucket 'extras' (para VLC)
        shell: powershell
        run: scoop bucket add extras

      - name: Añadir bucket personal ser356
        shell: powershell
        run: scoop bucket add ser356 https://github.com/ser356/scoop-bucket

      - name: Instalar videodrome
        shell: powershell
        run: scoop install ser356/videodrome

      - name: Verificar CLI en PATH
        shell: powershell
        run: |
          Get-Command videodrome
          videodrome --help

      - name: Verificar VLC como dependencia
        shell: powershell
        run: scoop list

  homebrew-cask:
    runs-on: macos-latest
    steps:
      - name: Añadir tap
        run: brew tap ser356/cask https://github.com/ser356/homebrew-cask
      - name: Trust Tap
        run: brew trust ser356/cask
      - name: Instalar videodrome
        run: brew install --cask videodrome

      - name: Verificar .app en /Applications
        run: |
          test -d "/Applications/Videodrome.app" || (echo "❌ Videodrome.app no encontrado"; exit 1)
          echo "✅ .app instalado"

      - name: Verificar CLI (symlink en PATH)
        run: |
          which videodrome
          videodrome --help
