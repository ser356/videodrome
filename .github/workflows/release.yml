name: Release

# Se dispara al pushear un tag `v*` (ej. `v0.1.0`, `v0.2.0-rc1`).
# También lanzable a mano desde la pestaña Actions.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/versión a publicar (ej. v0.2.0)"
        required: true

permissions:
  contents: write # necesario para crear/actualizar la Release

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            name: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            name: macos-arm64
          # NOTA: no publicamos binario x86_64-apple-darwin porque los
          # runners `macos-13` de GitHub Actions están deprecated y se
          # cuelgan en queue durante horas. Los Macs Intel ejecutan el
          # binario arm64 sin problema vía Rosetta 2 (preinstalada o
          # instalable en un click en macOS 13+).
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cachear dependencias de cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build en release con las credenciales de app inyectadas como env
      # vars — `option_env!` en config.rs las hornea al binario.
      - name: cargo build --release
        env:
          LB_APP_CLIENT_ID: ${{ secrets.LB_APP_CLIENT_ID }}
          LB_APP_CLIENT_SECRET: ${{ secrets.LB_APP_CLIENT_SECRET }}
          LB_APP_TMDB_BEARER: ${{ secrets.LB_APP_TMDB_BEARER }}
          LB_APP_OS_API_KEY: ${{ secrets.LB_APP_OS_API_KEY }}
        run: cargo build --release --target ${{ matrix.target }}

      # Empaqueta el binario + README + LICENSE (si existe).
      - name: Empaquetar (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/letterboxd-cli dist/
          cp README.md dist/ 2>/dev/null || true
          cp LICENSE dist/ 2>/dev/null || true
          cd dist
          tar czf ../letterboxd-cli-${{ matrix.name }}.tar.gz *

      - name: Empaquetar (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/letterboxd-cli.exe dist/
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          if (Test-Path LICENSE)   { Copy-Item LICENSE dist/ }
          Compress-Archive -Path dist/* -DestinationPath letterboxd-cli-${{ matrix.name }}.zip

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: letterboxd-cli-${{ matrix.name }}
          path: letterboxd-cli-${{ matrix.name }}.*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  # Publica manifestos actualizados en los repos externos
  # `ser356/homebrew-tap` y `ser356/scoop-bucket`. Va como job del mismo
  # workflow (en vez de `on: release: published` en otro workflow) porque
  # los workflows disparados por `GITHUB_TOKEN` no disparan otros workflows
  # (protección anti-recursión de GitHub Actions).
  publish-packages:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout letterboxd-cli
        uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Descargar artifacts del release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "${{ steps.v.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -p 'letterboxd-cli-*.tar.gz' \
            -p 'letterboxd-cli-*.zip' \
            -D artifacts
          echo "Artifacts descargados:"
          ls -la artifacts/

      - name: Calcular SHA256
        id: sha
        run: |
          cd artifacts
          SHA_MAC_ARM64=$(sha256sum letterboxd-cli-macos-arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_X86_64=$(sha256sum letterboxd-cli-linux-x86_64.tar.gz | awk '{print $1}')
          SHA_WIN_X86_64=$(sha256sum letterboxd-cli-windows-x86_64.zip | awk '{print $1}')
          echo "mac_arm64=$SHA_MAC_ARM64"       >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$SHA_LINUX_X86_64" >> "$GITHUB_OUTPUT"
          echo "win_x86_64=$SHA_WIN_X86_64"     >> "$GITHUB_OUTPUT"

      # ---------- HOMEBREW TAP ----------
      - name: Render fórmula Homebrew
        run: |
          mkdir -p out
          sed \
            -e "s|{{VERSION}}|${{ steps.v.outputs.version }}|g" \
            -e "s|{{SHA_MAC_ARM64}}|${{ steps.sha.outputs.mac_arm64 }}|g" \
            -e "s|{{SHA_LINUX_X86_64}}|${{ steps.sha.outputs.linux_x86_64 }}|g" \
            packaging/homebrew/letterboxd-cli.rb.tmpl > out/letterboxd-cli.rb
          echo "----- fórmula generada -----"
          cat out/letterboxd-cli.rb

      - name: Push a ser356/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp out/letterboxd-cli.rb tap/Formula/letterboxd-cli.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/letterboxd-cli.rb
          if git diff --cached --quiet; then
            echo "No hay cambios en la fórmula."
          else
            git commit -m "letterboxd-cli ${{ steps.v.outputs.tag }}"
            git push
          fi

      # ---------- SCOOP BUCKET ----------
      - name: Render manifest Scoop
        run: |
          sed \
            -e "s|{{VERSION}}|${{ steps.v.outputs.version }}|g" \
            -e "s|{{SHA_WIN_X86_64}}|${{ steps.sha.outputs.win_x86_64 }}|g" \
            packaging/scoop/letterboxd-cli.json.tmpl > out/letterboxd-cli.json
          echo "----- manifest generado -----"
          cat out/letterboxd-cli.json

      - name: Push a ser356/scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/scoop-bucket.git" bucket
          # La convención de Scoop es que los manifests vivan en `bucket/` o
          # en la raíz. Usamos `bucket/` (permite `scoop bucket add …` limpio).
          mkdir -p bucket/bucket
          cp out/letterboxd-cli.json bucket/bucket/letterboxd-cli.json
          cd bucket
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/letterboxd-cli.json
          if git diff --cached --quiet; then
            echo "No hay cambios en el manifest."
          else
            git commit -m "letterboxd-cli ${{ steps.v.outputs.tag }}"
            git push
          fi
