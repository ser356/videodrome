name: Release

# Se dispara al pushear un tag `v*` (ej. `v0.2.0`).
# También lanzable a mano desde la pestaña Actions.
#
# Produce dos tipos de artefactos:
#   - GUI bundle:  Videodrome.app (mac, arm64) y Videodrome.exe (win, x64).
#                  El mismo binario acepta subcomandos por terminal → CLI.
#   - Linux CLI:   binario suelto en tar.gz (Linux no tiene bundle GUI; se
#                  usa como CLI puro).
#
# Publica el cask (mac) en `ser356/homebrew-cask` y el manifest scoop
# (win) en `ser356/scoop-bucket`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/versión a publicar (ej. v0.2.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Linux: solo binario CLI (sin GUI) ─────────────────────────────
  build-linux-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-cli
      - name: cargo build --release (sin gui)
        env:
          LB_APP_CLIENT_ID: ${{ secrets.LB_APP_CLIENT_ID }}
          LB_APP_CLIENT_SECRET: ${{ secrets.LB_APP_CLIENT_SECRET }}
          LB_APP_TMDB_BEARER: ${{ secrets.LB_APP_TMDB_BEARER }}
          LB_APP_OS_API_KEY: ${{ secrets.LB_APP_OS_API_KEY }}
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Empaquetar
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/videodrome dist/videodrome
          cp README.md dist/ 2>/dev/null || true
          cp LICENSE dist/ 2>/dev/null || true
          cd dist
          tar czf ../videodrome-${{ github.ref_name }}-linux-x86_64.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: videodrome-linux-x86_64
          path: videodrome-*-linux-x86_64.tar.gz
          retention-days: 7

  # ─── macOS: Videodrome.app zippeado (GUI + CLI dual) ───────────────
  build-macos-gui:
    runs-on: macos-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-gui
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Instalar tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build frontend
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Tauri build (app bundle)
        env:
          LB_APP_CLIENT_ID: ${{ secrets.LB_APP_CLIENT_ID }}
          LB_APP_CLIENT_SECRET: ${{ secrets.LB_APP_CLIENT_SECRET }}
          LB_APP_TMDB_BEARER: ${{ secrets.LB_APP_TMDB_BEARER }}
          LB_APP_OS_API_KEY: ${{ secrets.LB_APP_OS_API_KEY }}
        run: |
          cargo tauri build \
            --target aarch64-apple-darwin \
            --bundles app \
            --features gui

      - name: Empaquetar .app en zip (ditto preserva metadatos)
        run: |
          APP_PATH="target/aarch64-apple-darwin/release/bundle/macos/Videodrome.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app no encontrado en $APP_PATH"
            find target -name "*.app" -type d
            exit 1
          fi
          ZIP="videodrome-${{ github.ref_name }}-macos-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP"
          echo "✅ Generado $ZIP ($(du -h "$ZIP" | cut -f1))"

      # SHA256 del artefacto EXACTO que se sube. Se propaga como job output
      # y lo consume `publish-packages` sin volver a descargar el zip (un
      # re-run del job de macOS regenera el .app con distinto timestamp/
      # firma ad-hoc → distinto SHA → checksum mismatch en el tap).
      - name: SHA256 del zip macOS
        id: sha
        run: |
          ZIP="videodrome-${{ github.ref_name }}-macos-arm64.zip"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - uses: actions/upload-artifact@v4
        with:
          name: videodrome-macos-arm64
          path: videodrome-*-macos-arm64.zip
          retention-days: 7

  # ─── Windows: .exe zippeado (GUI + CLI dual) ───────────────────────
  build-windows-gui:
    runs-on: windows-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-gui
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Instalar tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build frontend
        working-directory: ui
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Tauri build (nsis)
        env:
          LB_APP_CLIENT_ID: ${{ secrets.LB_APP_CLIENT_ID }}
          LB_APP_CLIENT_SECRET: ${{ secrets.LB_APP_CLIENT_SECRET }}
          LB_APP_TMDB_BEARER: ${{ secrets.LB_APP_TMDB_BEARER }}
          LB_APP_OS_API_KEY: ${{ secrets.LB_APP_OS_API_KEY }}
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis --features gui

      - name: Empaquetar .exe en zip (para scoop)
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/videodrome.exe"
          if (-not (Test-Path $exe)) {
            Write-Error ".exe no encontrado en $exe"
            Get-ChildItem target -Recurse -Filter *.exe
            exit 1
          }
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item $exe pkg/videodrome.exe
          Compress-Archive -Path pkg/videodrome.exe -DestinationPath "videodrome-${{ github.ref_name }}-windows-x86_64.zip"

      - name: SHA256 del zip Windows
        id: sha
        shell: pwsh
        run: |
          $zip = "videodrome-${{ github.ref_name }}-windows-x86_64.zip"
          $sha = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "SHA256: $sha"

      - uses: actions/upload-artifact@v4
        with:
          name: videodrome-windows-x86_64
          path: videodrome-*-windows-x86_64.zip
          retention-days: 7

  # ─── Publicar Release + subir todos los artifacts ──────────────────
  release:
    needs: [build-linux-cli, build-macos-gui, build-windows-gui]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"   >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  # ─── Cask (mac) + scoop (win) ──────────────────────────────────────
  # Consume los SHA256 calculados en los jobs de build (misma ejecución
  # que produjo el zip). No re-descarga por URL pública: si algún job de
  # build se re-ejecuta y regenera el zip con distinto contenido (Rust
  # no es determinista + firma ad-hoc de tauri), el SHA del cask ya no
  # cuadraría con lo que hay publicado. Con este esquema, el SHA es
  # siempre del bit-a-bit que se subió a la release.
  publish-packages:
    needs: [release, build-macos-gui, build-windows-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar SHAs recibidos
        run: |
          echo "SHA macOS:   ${{ needs.build-macos-gui.outputs.sha256 }}"
          echo "SHA Windows: ${{ needs.build-windows-gui.outputs.sha256 }}"
          test -n "${{ needs.build-macos-gui.outputs.sha256 }}"   || { echo "❌ SHA macOS vacío";   exit 1; }
          test -n "${{ needs.build-windows-gui.outputs.sha256 }}" || { echo "❌ SHA Windows vacío"; exit 1; }

      # ── HOMEBREW CASK (mac) ──
      - name: Render cask
        run: |
          mkdir -p out
          sed \
            -e "s|{{VERSION}}|${{ needs.release.outputs.version }}|g" \
            -e "s|{{TAG}}|${{ needs.release.outputs.tag }}|g" \
            -e "s|{{SHA_MAC}}|${{ needs.build-macos-gui.outputs.sha256 }}|g" \
            -e "s|{{REPO}}|${{ github.repository }}|g" \
            packaging/homebrew-cask/videodrome.rb.tmpl > out/videodrome.rb
          cat out/videodrome.rb

      - name: Push a ser356/homebrew-cask
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/homebrew-cask.git" cask
          mkdir -p cask/Casks
          cp out/videodrome.rb cask/Casks/videodrome.rb
          cd cask
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/videodrome.rb
          if git diff --cached --quiet; then
            echo "No hay cambios en el cask."
          else
            git commit -m "videodrome ${{ needs.release.outputs.tag }}"
            git push
          fi

      # ── SCOOP BUCKET (win) ──
      - name: Render scoop manifest
        run: |
          sed \
            -e "s|{{VERSION}}|${{ needs.release.outputs.version }}|g" \
            -e "s|{{TAG}}|${{ needs.release.outputs.tag }}|g" \
            -e "s|{{SHA_WIN}}|${{ needs.build-windows-gui.outputs.sha256 }}|g" \
            -e "s|{{REPO}}|${{ github.repository }}|g" \
            packaging/scoop/videodrome.json.tmpl > out/videodrome.json
          cat out/videodrome.json

      - name: Push a ser356/scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cp out/videodrome.json bucket/bucket/videodrome.json
          cd bucket
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/videodrome.json
          if git diff --cached --quiet; then
            echo "No hay cambios en el manifest."
          else
            git commit -m "videodrome ${{ needs.release.outputs.tag }}"
            git push
          fi
