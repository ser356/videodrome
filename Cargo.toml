[package]
name = "letterboxd-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "letterboxd-cli"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "gzip"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dotenvy = "0.15"
anyhow = "1"
dirs = "5"
indicatif = "0.17"
colored = "2"
